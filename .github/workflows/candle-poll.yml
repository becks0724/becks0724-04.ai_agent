# CoinGecko market_chart에서 일봉을 받아 Supabase candles에 적재한다.
# 워커는 POLL_ONCE=1 모드로 1회 실행 후 종료. days=2로 어제·오늘을 함께 UPSERT (멱등).
#
# 주기: 매일 01:15 UTC. fear-greed.yml(01:00 UTC)과 살짝 어긋나게 두어 cron 폭주 회피.

name: candle poller

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candle-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: worker/requirements.txt

      - name: Install deps
        run: pip install -r worker/requirements.txt

      - name: Run poller (1회 적재)
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POLL_SYMBOLS: BTC,ETH,SOL
          POLL_ONCE: '1'
          CANDLE_DAYS: '2'
          WORKER_ENV: github-actions
        run: python candle_poller.py
